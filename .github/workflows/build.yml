name: Build ejecutables

# Se ejecuta al crear un tag v* (p. ej. v1.1.1) o manualmente desde Actions.
# Produce un instalador amigable por plataforma:
#   macOS  → .dmg (arrastrar a Aplicaciones)
#   Windows→ instalador .exe (Inno Setup, sin admin)
#   Linux  → .AppImage (un solo archivo ejecutable)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: NoteTaker-macOS-AppleSilicon.dmg
          - os: macos-13
            asset: NoteTaker-macOS-Intel.dmg
          - os: windows-latest
            asset: NoteTaker-Windows-Setup.exe
          - os: ubuntu-latest
            asset: NoteTaker-Linux-x86_64.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencias del sistema (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libportaudio2

      - name: Instalar dependencias
        run: pip install -r requirements.txt pyinstaller

      # Fuente única de versión para el auto-actualizador: el archivo VERSION.
      # En builds por tag se fija a la tag (sin la 'v'); en workflow_dispatch se
      # respeta el valor ya comprometido en el repo.
      - name: Fijar versión desde la tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Construir
        run: pyinstaller notetaker.spec --noconfirm

      # ---------------------------------------------------------- macOS DMG
      - name: Empaquetar DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr "dist/Note Taker.app"
          codesign --force --deep --sign - "dist/Note Taker.app"
          mkdir -p dmgroot
          cp -R "dist/Note Taker.app" dmgroot/
          ln -s /Applications "dmgroot/Applications"
          hdiutil create -volname "Note Taker" -srcfolder dmgroot -ov -format UDZO "${{ matrix.asset }}"

      # --------------------------------------------------- Windows installer
      - name: Instalar Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Empaquetar instalador (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=${{ github.ref_name }}" packaging\notetaker.iss
          Move-Item "packaging\Output\NoteTaker-Setup.exe" "${{ matrix.asset }}"

      # ------------------------------------------------------- Linux AppImage
      - name: Empaquetar AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          APPDIR=NoteTaker.AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -R "dist/Note Taker/." "$APPDIR/usr/bin/"
          cp logo/note-taker.png "$APPDIR/notetaker.png"
          cat > "$APPDIR/notetaker.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Note Taker
          Exec=AppRun
          Icon=notetaker
          Categories=Utility;AudioVideo;
          Terminal=false
          EOF
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Note Taker" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool "$APPDIR" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: Publicar en el release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
