<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Note Taker</title>
  <link rel="icon" href="/static/logo.png">
  <link rel="stylesheet" href="/static/vendor/codemirror.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <aside id="sidebar">
    <header>
      <img id="logo" src="/static/logo.png" alt="Note Taker">
      <button id="btn-new" class="primary" data-i18n="new_transcription">+ Nueva transcripción</button>
    </header>
    <ul id="file-list"></ul>
    <div id="trash" class="hidden">
      <button id="trash-toggle">
        <span id="trash-caret">▸</span>
        <span data-i18n="trash_title">Papelera</span>
        <span id="trash-count"></span>
      </button>
      <ul id="trash-list" class="hidden"></ul>
    </div>
    <footer>
      <label class="field">
        <span data-i18n="model_label">Modelo</span>
        <select id="model-select">
          <option value="tiny" data-i18n="model_tiny">tiny — muy rápido</option>
          <option value="base" data-i18n="model_base">base — rápido</option>
          <option value="small" data-i18n="model_small">small — rápido y preciso</option>
          <option value="medium" selected data-i18n="model_medium">medium — recomendado</option>
        </select>
      </label>
      <label class="field">
        <span data-i18n="mic_label">Micrófono</span>
        <select id="device-select"></select>
      </label>
      <div class="field-row">
        <label class="field">
          <span data-i18n="lang_label">Idioma</span>
          <select id="lang-select">
            <option value="es" selected>Español</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
          </select>
        </label>
        <label class="field">
          <span data-i18n="chunk_label">Fragmentos</span>
          <select id="chunk-select">
            <option value="5">5 s</option>
            <option value="8">8 s</option>
            <option value="10">10 s</option>
            <option value="15">15 s</option>
            <option value="20" selected>20 s</option>
          </select>
        </label>
      </div>
      <button id="btn-folder">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
             stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7a2 2 0 0 1 2-2h3.6a2 2 0 0 1 1.4.6L11.4 7H19a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/>
        </svg>
        <span data-i18n="open_folder">Abrir carpeta</span>
      </button>
      <button id="btn-coffee" data-i18n-title="coffee_title" title="Apoya esta herramienta">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor"
             stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 8h11v6a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8Z"/>
          <path d="M16 9h2.2a2.3 2.3 0 0 1 0 4.6H16"/>
          <path d="M8 2.4c-.6.9.2 1.7-.2 2.7M11.5 2.4c-.6.9.2 1.7-.2 2.7"/>
        </svg>
        <span data-i18n="coffee">Invítame un café</span>
      </button>
    </footer>
  </aside>

  <main id="main">
    <div id="update-bar" class="hidden">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>
      </svg>
      <span id="update-msg"></span>
      <span class="spacer"></span>
      <button id="update-go" class="primary"></button>
      <button id="update-dismiss" title="">✕</button>
      <div id="update-progress" class="hidden"><div id="update-progress-fill"></div></div>
    </div>
    <div id="toolbar">
      <span id="file-name" data-i18n-title="rename_hint" data-i18n="no_file" title="Clic para renombrar">Sin archivo</span>
      <span class="spacer"></span>
      <span id="status-pill" class="pill idle" data-i18n="status_idle">Listo</span>
      <button id="btn-record" class="record" disabled>● Grabar</button>
    </div>
    <div id="editor-wrap">
      <textarea id="editor"></textarea>
    </div>
    <div id="statusbar">
      <span id="save-state">—</span>
      <span class="spacer"></span>
      <span id="word-count"></span>
      <div id="lang-switch">
        <button data-lang="es">ES</button>
        <button data-lang="en">EN</button>
        <button data-lang="fr">FR</button>
      </div>
    </div>
  </main>

  <div id="modal" class="hidden">
    <div id="modal-box">
      <p id="modal-msg"></p>
      <input id="modal-input" class="hidden" spellcheck="false">
      <div id="modal-actions">
        <button id="modal-cancel" data-i18n="cancel">Cancelar</button>
        <button id="modal-ok" class="primary">Aceptar</button>
      </div>
    </div>
  </div>

  <div id="donate" class="hidden">
    <div id="donate-box">
      <button id="donate-x" data-i18n-title="donate_close" title="Cerrar">×</button>
      <p id="donate-proverb"></p>
      <p id="donate-sign"></p>
      <p id="donate-ask"></p>
      <div id="donate-amounts"></div>
      <div id="donate-cur-row">
        <label for="donate-currency" data-i18n="donate_currency">Moneda</label>
        <select id="donate-currency"></select>
      </div>
      <p id="donate-unconfig" class="hidden" data-i18n="donate_unconfig">Las donaciones aún no están disponibles.</p>
      <div id="donate-foot">
        <label id="donate-never"><input type="checkbox" id="donate-never-cb"> <span data-i18n="donate_already">¡Ya doné! No volver a mostrar</span></label>
        <button id="donate-later" data-i18n="later">Ahora no</button>
      </div>
    </div>
  </div>

  <script src="/static/i18n.js"></script>
  <script src="/static/vendor/codemirror.min.js"></script>
  <script src="/static/vendor/markdown.min.js"></script>
  <script src="/static/vendor/placeholder.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
